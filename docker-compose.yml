services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trackify-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist the SQLite database file outside the container
      - ./backend/trackify.db:/app/trackify.db
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trackify-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
